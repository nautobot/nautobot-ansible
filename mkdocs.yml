plugins:
  # - autorefs
  # - markdown-exec
  - material/search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  # https://github.com/squidfunk/mkdocs-material/issues/6983
  # - material/social
  - material/tags
  # https://github.com/manuzhang/mkdocs-htmlproofer-plugin
  # - htmlproofer
  - mkdocstrings:
      handlers:
        python:
          paths: ["."]
          options:
            merge_init_into_class: yes
            show_submodules: yes
            heading_level: 1
            show_root_heading: true
            show_root_members_full_path: true
            show_source: true
          import:
            - url: https://docs.ansible.com/ansible/latest/objects.inv
              domains: [py, std]

markdown_extensions:
  # - markdown_include.include:
  #     base_path: docs
  - "admonition"
  - "attr_list" # needed by our def_list use in order to add hrefs to <dt> tags
  - "def_list"
  - "footnotes"
  - "markdown_version_annotations"
  - "pymdownx.details"
  - "pymdownx.highlight":
      anchor_linenums: true
  - "pymdownx.inlinehilite"
  - "pymdownx.magiclink":
      repo_url_shortener: true
      repo_url_shorthand: true
      social_url_shorthand: true
      social_url_shortener: true
      user: facelessuser
      repo: pymdown-extensions
      normalize_issue_symbols: true
  - "pymdownx.tabbed":
      alternate_style: true
  - "toc":
      toc_depth: 2-3
      permalink: true
  - "pymdownx.superfences":
      "custom_fences":
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
        # - name: python
        #   class: python
        #   validator: !!python/name:markdown_exec.validator
        #   format: !!python/name:markdown_exec.formatter